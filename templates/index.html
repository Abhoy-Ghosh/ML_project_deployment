<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Performance Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            background:#f4f6f9;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:20px;
        }

        .container{

            width:100%;

            max-width:700px;

            background:white;

            padding:35px;

            border-radius:12px;

            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        }

        h1{

            text-align:center;

            margin-bottom:10px;

            color:#222;
        }

        .subtitle{

            text-align:center;

            color:#666;

            margin-bottom:30px;

            font-size:14px;
        }

        .form-group{

            margin-bottom:18px;
        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#333;
        }

        .form-control{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:14px;

            outline:none;

            transition:0.2s;
        }

        .form-control:focus{

            border-color:#4a90e2;
        }

        .btn{

            width:100%;

            padding:14px;

            border:none;

            border-radius:8px;

            background:#4a90e2;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.2s;

            margin-top:10px;
        }

        .btn:hover{

            background:#357bd8;
        }

        .result{

            margin-top:25px;

            padding:15px;

            border-radius:8px;

            background:#eef5ff;

            text-align:center;

            font-size:18px;

            font-weight:bold;

            color:#1f4e8c;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Student Exam Performance Predictor</h1>

        <p class="subtitle">
            Predict Maths Score using student information
        </p>


        <!-- ================================================= -->
        <!-- FORM START -->
        <!-- ================================================= -->

        <form action="/predict" method="post">


            <!-- Gender -->

            <div class="form-group">

                <label>Gender</label>

                <select class="form-control"
                        name="gender"
                        required>

                    <option selected disabled value="">
                        Select Gender
                    </option>

                    <option value="male">
                        Male
                    </option>

                    <option value="female">
                        Female
                    </option>

                </select>

            </div>


            <!-- Ethnicity -->

            <div class="form-group">

                <label>Race / Ethnicity</label>

                <select class="form-control"
                        name="ethnicity"
                        required>

                    <option selected disabled value="">
                        Select Ethnicity
                    </option>

                    <option value="group A">Group A</option>

                    <option value="group B">Group B</option>

                    <option value="group C">Group C</option>

                    <option value="group D">Group D</option>

                    <option value="group E">Group E</option>

                </select>

            </div>


            <!-- Parent Education -->

            <div class="form-group">

                <label>Parental Level of Education</label>

                <select class="form-control"
                        name="parental_level_of_education"
                        required>

                    <option selected disabled value="">
                        Select Parent Education
                    </option>

                    <option value="associate's degree">
                        Associate's Degree
                    </option>

                    <option value="bachelor's degree">
                        Bachelor's Degree
                    </option>

                    <option value="high school">
                        High School
                    </option>

                    <option value="master's degree">
                        Master's Degree
                    </option>

                    <option value="some college">
                        Some College
                    </option>

                    <option value="some high school">
                        Some High School
                    </option>

                </select>

            </div>


            <!-- Lunch -->

            <div class="form-group">

                <label>Lunch Type</label>

                <select class="form-control"
                        name="lunch"
                        required>

                    <option selected disabled value="">
                        Select Lunch Type
                    </option>

                    <option value="free/reduced">
                        Free / Reduced
                    </option>

                    <option value="standard">
                        Standard
                    </option>

                </select>

            </div>


            <!-- Test Preparation -->

            <div class="form-group">

                <label>Test Preparation Course</label>

                <select class="form-control"
                        name="test_preparation_course"
                        required>

                    <option selected disabled value="">
                        Select Course Status
                    </option>

                    <option value="none">
                        None
                    </option>

                    <option value="completed">
                        Completed
                    </option>

                </select>

            </div>


            <!-- Reading Score -->

            <div class="form-group">

                <label>Reading Score</label>

                <input
                    class="form-control"
                    type="number"
                    name="reading_score"
                    placeholder="Enter Reading Score"
                    min="0"
                    max="100"
                    required
                />

            </div>


            <!-- Writing Score -->

            <div class="form-group">

                <label>Writing Score</label>

                <input
                    class="form-control"
                    type="number"
                    name="writing_score"
                    placeholder="Enter Writing Score"
                    min="0"
                    max="100"
                    required
                />

            </div>


            <!-- Submit Button -->

            <button class="btn" type="submit">

                Predict Maths Score

            </button>

        </form>


        <!-- ================================================= -->
        <!-- RESULT -->
        <!-- ================================================= -->

        {% if results %}

        <div class="result">

            Predicted Maths Score : {{ results }}

        </div>

        {% endif %}

    </div>

</body>

</html>
